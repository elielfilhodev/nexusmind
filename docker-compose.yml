services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexusmind
      POSTGRES_PASSWORD: nexusmind
      POSTGRES_DB: nexusmind
    ports:
      - "5432:5432"
    volumes:
      - nexusmind_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusmind -d nexusmind"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nexusmind_pg:
