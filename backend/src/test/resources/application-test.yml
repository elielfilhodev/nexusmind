spring:
  datasource:
    url: jdbc:h2:mem:nexusmind;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  ai:
    api-key: ""
  cors:
    allowed-origins: http://localhost:3000
  rate-limit:
    per-minute: 1000
    competitive-per-minute: 1000
  riot:
    api-key: ""
