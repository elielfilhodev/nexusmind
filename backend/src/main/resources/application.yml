spring:
  application:
    name: nexusmind-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 512KB
      max-request-size: 512KB
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nexusmind}
    username: ${DATABASE_USER:nexusmind}
    password: ${DATABASE_PASSWORD:nexusmind}
    hikari:
      maximum-pool-size: 10
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  tomcat:
    max-http-form-post-size: 512KB
    max-swallow-size: 512KB
  servlet:
    session:
      cookie:
        secure: false
        same-site: lax
  error:
    include-message: always
    include-binding-errors: never
    include-stacktrace: on_param
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  rate-limit:
    per-minute: ${APP_RATE_LIMIT_PER_MINUTE:30}
  ai:
    provider: ${AI_PROVIDER:openai_compatible}
    base-url: ${AI_BASE_URL:https://openrouter.ai/api/v1}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:google/gemma-2-9b-it:free}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:90}
    # 503/429 do Gemini costumam exigir várias tentativas com intervalo (ver backoff no provider)
    max-retries: ${AI_MAX_RETRIES:5}

logging:
  level:
    root: INFO
    com.nexusmind: INFO
